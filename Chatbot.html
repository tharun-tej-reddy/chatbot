<!DOCTYPE html>
<html>

<head>
    <title>ChatBot</title>
    <style>
        body{
            font-family: Arial;
            margin-top:0px;
            margin-bottom:0px;
        }
        .send-button{
            background-color: green;
            color:white;
            padding: 12px 20px;
            margin-left: 10px;
            border: none;
            border-radius:10px;
            font-size:15px;
            cursor: pointer;
        }
        .chat-input{
             padding: 12px 15px;
             border-radius:10px;
             border-width: 1px;
             font-size:15px;
             width:60vw;
             flex-grow:1;
        }
        .chat-input-container{
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 60px;
        }
        .app-container{
            max-width:700px;
            margin-left: auto;
            margin-right: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            
        }
        .user{

            display: flex;
            justify-content: end;
            margin-top: 20px;
            align-items:start;
            
        }
        .robot{
            display:flex;
            justify-content: start;
            margin-top: 20px;
            align-items: start;
        }
        .chat-message-text{
            background-color: rgb(238, 238,238);
            padding: 15px 20px;
            border-radius:10px;
            margin-right: 10px;
            margin-left: 10px;
            max-width:300px;
            word-break: break-word;

        }
        .chat-message-profile{
            width:50px;
        }
        .chat-messages-container{
            flex-grow: 1;
            margin-top: 20px;
            overflow: scroll;
            scrollbar-width: none;
        }
        .intro-message{
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>

<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/dayjs/dayjs.min.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        const container = document.querySelector('.js-container');
        const root = ReactDOM.createRoot(container);
        function ChatInput({chatMessages,setChatMessages,setToggle,toggle}) {
        
           const [inputText,setInputText]= React.useState("");
           const [bool,setbool]=React.useState(false);
            function saveInputText(event){
               setInputText(
                  event.target.value
               );
            }
            async function sendMessage(){
                if(chatMessages.length===0 ){
                    setToggle(false); 
                }
                if(bool || inputText===' '){
                    return ;
                }
                setbool(true);
                const newMessage=[
                    ...chatMessages,
                    {
                        message:inputText,
                        sender:"user",
                        id:crypto.randomUUID()
                    }
                ];
                setChatMessages(newMessage)
                setInputText("");
                setbool
                const response = await chatbot.getResponseAsync(inputText);
                setChatMessages([
                 ...newMessage,
                 {
                    message:response,
                    sender:"robot",
                    id:crypto.randomUUID()
                 }
               ]);
               setbool(false);  
            }
            function fun(event){
                 event.key==='Enter'&& sendMessage()
                 event.key==='Escape' && setInputText("")
            }
            return (
                <div className="chat-input-container">
                    <input
                        size="30"
                        type="text"
                        placeholder="send a message to chatBot"
                        onChange={saveInputText}
                        value={inputText}
                        onKeyDown={fun}
                        disabled={bool}
                        className="chat-input"
                    />
                    <button onClick={sendMessage} className="send-button" >Send</button>
                </div>
            );
        }
        function ChatMessage({ message, sender }) {
            return (
                <div className={sender}>
                    {sender === "robot" && (
                        <img src="robot.png"  className="chat-message-profile" />
                    )}
                    <div className="chat-message-text">
                        {message}
                    </div>
                    {sender === "user" && (
                        <img src="user.png" width="50" className="chat-message-profile" />

                    )}
                </div>
            );
        }
        function ChatMessages({chatMessages}){
            const chatMessagesRef=React.useRef(null);
            React.useEffect(()=>{
                const containerElem=chatMessagesRef.current;
                if(containerElem){
                    containerElem.scrollTop=containerElem.scrollHeight;
                }
            },[chatMessages]); 
            
            return (
                <div className="chat-messages-container" ref={chatMessagesRef}>
                
                {chatMessages.map((chatMessage)=>{
                return(
                    <ChatMessage message={chatMessage.message} sender={chatMessage.sender} key={chatMessage.id}/>
                );
            })}
                </div>
            );
        }
        function App(){
            const [chatMessages,setChatMessages]=React.useState([]);
            const [toggle,setToggle]=React.useState(true);
           // const [chatMessages,setChatMessages]=array;
           // const chatMessages=array[0]; 
           // const setChatMessages=array[1]; 

            return(
                <div className="app-container">
                {toggle===true && <p className="intro-message">Welcome to the chatbot project! Send a message using the textbox below.</p>}
                <ChatMessages chatMessages={chatMessages} />
                <ChatInput chatMessages={chatMessages} setChatMessages={setChatMessages} setToggle={setToggle} toggle={toggle}/>
                </div>
            );
        }

        
        root.render(<App/>)
    </script>
</body>

</html>
